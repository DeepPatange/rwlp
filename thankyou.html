<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - The RaWood Shed</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .thankyou-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            background: var(--color-bg);
        }
        .thankyou-logo {
            height: 120px;
            margin-bottom: 40px;
        }
        .thankyou-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: #4A2C1A;
            margin-bottom: 20px;
        }
        .thankyou-text {
            font-family: var(--font-primary);
            font-size: 1.2rem;
            color: #6B5A48;
            max-width: 600px;
            line-height: 1.8;
            margin-bottom: 40px;
        }
        .thankyou-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 48px;
            border-radius: 8px;
            font-family: var(--font-primary);
            font-size: 1.05rem;
            font-weight: 600;
            background: linear-gradient(105deg, #C49A30 0%, #D4A843 30%, #E8C84A 55%, #FFF1A0 80%, #FFFBE0 100%);
            color: var(--color-dark-green);
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(212, 168, 67, 0.35);
            transition: all 0.3s ease;
        }
        .thankyou-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(212, 168, 67, 0.5);
        }
    </style>
</head>
<body>
    <div class="thankyou-page">
        <img src="assets/images/black logo.png" alt="The RaWood Shed" class="thankyou-logo">
        <h1 class="thankyou-title">Thank You!</h1>
        <p class="thankyou-text">
            Your enquiry has been received. Our team will get back to you shortly
            with the best wood slab options for your project.
        </p>
        <a href="index.html" class="thankyou-btn">Back to Home</a>
    </div>
</body>
</html>
